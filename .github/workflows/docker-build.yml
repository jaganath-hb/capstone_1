name: Docker Image CI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # NEW: Create lowercase image name
    - name: Set lowercase image name
      id: vars
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE=ghcr.io/$OWNER/$REPO:latest" >> $GITHUB_ENV
        echo "IMAGE_SHA=ghcr.io/$OWNER/$REPO:${{ github.sha }}" >> $GITHUB_ENV

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: |
        docker build -t "$IMAGE" -t "$IMAGE_SHA" .

    - name: Push image
      run: |
        docker push "$IMAGE"
        docker push "$IMAGE_SHA"
